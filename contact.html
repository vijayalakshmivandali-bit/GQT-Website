<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact us</title>
    <link rel="stylesheet" href="contact style.css">

    <!--fontwesome cnd link-->
    <link rel="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css">
</head>
<body>

    <!--create Home hyperlink-->
    <div class="link animate animate_rubberBand">
        <span>
            <i class="fa-solid fa-house"></i>
        </span>
        <a href="index.html">Home</a>
    </div> 

    <!--creating a form-->
    <div class= "container animate__animated animate__flip">
        <h1>Registration</h1>
        <hr>
        <form action="">
            <div class="boxes">
         <div>
          <input type="text"placeholder="FIRST NAME">   
          </div>

          <div>
            <input type="text"placeholder="LAST NAME">
          </div>

           <div>
            <input type="email"placeholder="ENTER EMAIL">
          </div>

           <div>
            <textarea placeholder="(SPECIFY YOUR REQUIRMENT)" rows="4" class="20"></textarea>
          </div>
          </div> 

          <div class="button">
            <input type="submit" value="REGISTER">
          </div>
        
    </div>
</body>
</html>
